<!DOCTYPE html>
<html>
<head>
    <title>GreenTrace Leaderboard</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .box { background: #1e293b; margin: 50px auto; padding: 20px; width: 60%; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #22c55e; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
<div class="box">
    <h1>🏆 Nashik Leaderboard</h1>

    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
        <div style="background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #22c55e; min-width: 200px;">
            <h3 style="margin: 0; color: #94a3b8; font-size: 0.9rem;">TOTAL WASTE RECYCLED</h3>
            <div style="font-size: 2rem; font-weight: bold; color: #22c55e;" id="totalWeight">0 kg</div>
        </div>
    </div>

    <table>
        <thead>
        <tr><th>Area Name</th><th>Points</th></tr>
        </thead>
        <tbody id="data"></tbody>
    </table>
</div>

<script>
    // 1. Function to load the Table
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/waste/leaderboard');
            const data = await res.json();
            const tableBody = document.getElementById('data');
            tableBody.innerHTML = ""; // Clear existing rows

            data.forEach(row => {
                tableBody.innerHTML += `<tr><td>${row[0]}</td><td>${row[1]} pts</td></tr>`;
            });
        } catch (err) {
            console.error("Error loading leaderboard table:", err);
        }
    }

    // 2. Function to load the Total Weight
    async function loadStats() {
        try {
            const res = await fetch('/api/waste/total-impact');
            if (res.ok) {
                const weight = await res.json();
                // Check if weight is null or undefined and default to 0
                const displayWeight = weight ? weight.toFixed(2) : "0.00";
                document.getElementById('totalWeight').innerText = displayWeight + " kg";
            }
        } catch (err) {
            console.error("Error loading total impact stats:", err);
        }
    }

    // 3. Run BOTH functions when the page loads
    window.onload = () => {
        loadLeaderboard();
        loadStats();
    };
</script>
</body>
</html>
