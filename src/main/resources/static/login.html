<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GreenTrace - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 15px; border: 1px solid #334155; text-align: center; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #22c55e; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; text-decoration: none; }
        .public-btn { background: #22c55e; color: white; }
        .public-btn:hover { background: #16a34a; }
        .recycler-btn { background: #3b82f6; color: white; }
        .recycler-btn:hover { background: #2563eb; }
        .footer-link { margin-top: 20px; display: block; color: #64748b; font-size: 0.8rem; text-decoration: none; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>GreenTrace</h1>
    <p>Choose your portal to begin</p>

    <a href="index.html" class="btn public-btn">Public: Add Waste</a>

    <a href="recycler.html" class="btn recycler-btn">Recycler: Buy/Claim</a>

    <a href="leaderboard.html" class="footer-link">View Community Leaderboard</a>
</div>
</body>
</html>
