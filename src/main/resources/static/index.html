<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GreenTrace - Post Waste</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; }
        .form-container { max-width: 500px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; }
        button { background: #22c55e; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #16a34a; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="form-container">
    <h1>🌱 Post Waste</h1>
    <p>Help Nashik go green by reporting recyclable waste.</p>

    <form id="wasteForm">
        <select id="category" required>
            <option value="">Select Category</option>
            <option value="Plastic">Plastic</option>
            <option value="E-Waste">E-Waste</option>
            <option value="Metal">Metal</option>
            <option value="Paper">Paper</option>
        </select>

        <input type="number" id="weight" placeholder="Weight (kg)" step="0.1" required>
        <input type="text" id="areaName" placeholder="Area Name (e.g. CIDCO)" required>

        <button type="submit">Submit Waste</button>
    </form>
    <p id="formStatus" class="status">Click submit to share your location and post.</p>
</div>

<script>
    document.getElementById('wasteForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get user's location first
        navigator.geolocation.getCurrentPosition(async (position) => {
            const wasteData = {
                category: document.getElementById('category').value,
                weight: parseFloat(document.getElementById('weight').value),
                areaName: document.getElementById('areaName').value,
                latitude: position.coords.latitude,
                longitude: position.coords.longitude
            };

            const response = await fetch('/api/waste/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(wasteData)
            });

            if (response.ok) {
                alert("Waste Posted Successfully!");
                window.location.href = "recycler.html"; // Go see it on the radar!
            }
        });
    });
</script>
</body>
</html>
