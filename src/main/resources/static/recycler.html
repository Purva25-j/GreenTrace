<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GreenTrace - Recycler Radar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .radar-status { color: #22c55e; font-weight: bold; margin-bottom: 20px; }
        .waste-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .waste-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; transition: 0.3s; text-align: left; }
        .waste-card:hover { border-color: #22c55e; transform: translateY(-5px); }
        .category { font-size: 1.2rem; color: #22c55e; font-weight: bold; margin-bottom: 8px; }
        .area { color: #94a3b8; margin: 10px 0; font-weight: 500; }
        .claim-btn { background: #22c55e; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .claim-btn:hover { background: #16a34a; }
        .no-data { grid-column: 1 / -1; padding: 40px; background: #1e293b; border-radius: 12px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 Recycler Radar</h1>
    <p id="status" class="radar-status">Initializing GPS...</p>

    <div id="wasteContainer" class="waste-grid">
    </div>
</div>

<script>
    // 1. Get User Location and Start Radar
    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        document.getElementById('status').innerText = `Radar Active: Scanning for available waste...`;

        console.log(`Your GPS: Lat ${lat}, Lon ${lon}`);
        fetchNearbyWaste(lat, lon);
    }, error => {
        document.getElementById('status').innerText = "❌ Error: Please enable GPS/Location access.";
        console.error("Geolocation error:", error);
    });

    // 2. Fetch and Display Waste
    async function fetchNearbyWaste(lat, lon) {
        try {
            const response = await fetch(`/api/waste/nearby?lat=${lat}&lon=${lon}`);
            const items = await response.json();

            console.log("Data received from Server:", items); // DEBUG: Check F12 Console

            const container = document.getElementById('wasteContainer');
            container.innerHTML = ""; // Clear loader

            if (!items || items.length === 0) {
                container.innerHTML = `<div class="no-data"><h3>No available waste found near Chunchale.</h3><p>Try posting new waste from the main page first!</p></div>`;
                return;
            }

            items.forEach(item => {
                // SAFETY: Handle both Java naming styles (areaName vs area_name)
                const area = item.areaName || item.area_name || "Unknown Area";
                const cardId = item.id;

                const card = document.createElement('div');
                card.className = 'waste-card';
                card.innerHTML = `
                    <div class="category">📦 ${item.category}</div>
                    <div class="area">📍 Area: ${area}</div>
                    <p><strong>Weight:</strong> ${item.weight} kg</p>
                    <p><strong>Reward:</strong> 🪙 ${item.credits} pts</p>
                    <button class="claim-btn" onclick="claimWaste(${cardId})">Claim & Earn Points</button>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error("Fetch error:", err);
            document.getElementById('status').innerText = "❌ Connection Error: Is the Backend running?";
        }
    }

    // 3. Claim Action
    async function claimWaste(id) {
        if(!confirm("Are you sure you want to claim this waste?")) return;

        try {
            const response = await fetch(`/api/waste/claim/${id}`, { method: 'POST' });
            if (response.ok) {
                alert("✅ Success! Waste claimed. Check the Leaderboard!");
                location.reload();
            } else {
                alert("❌ Failed to claim. It might have been taken already.");
            }
        } catch (err) {
            alert("❌ Server Error while claiming.");
        }
    }
</script>
</body>
</html>
