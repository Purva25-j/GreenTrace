spring.application.name=app
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Added allowPublicKeyRetrieval=true here
spring.datasource.url=jdbc:mysql://localhost:3306/greentrace_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# Updated to the modern Dialect (Hibernate 6/7 handles spatial automatically)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true